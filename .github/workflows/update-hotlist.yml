name: 更新知乎热榜
on:
  schedule:
    - cron: '*/30 * * * *'   # 每30分钟跑一次
  push: {branches: [main]}
  workflow_dispatch:          # 可手动触发

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}

      - name: 抓取热榜
        run: python zhihu_hot.py

      - name: 提交更新
        run: |
          git config user.name "bot"
          git config user.email "bot@localhost"
          git add hotlist.json
          git diff --cached --quiet || git commit -m "auto: 更新知乎热榜 $(date +%H:%M)"
          git push
