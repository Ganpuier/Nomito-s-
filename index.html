<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>杂坛</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    background:#f4f4f0;
    font-family:"Microsoft YaHei","PingFang SC",sans-serif;
    padding:40px 20px;
    display:flex;
    justify-content:center;
    min-height:100vh
  }
  .wrap{
    max-width:800px;
    width:100%
  }
  h1{
    font-size:14px;
    font-weight:400;
    color:#aaa;
    letter-spacing:4px;
    margin-bottom:32px;
    text-transform:uppercase
  }
  .col{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:40px
  }
  @media(max-width:600px){.col{grid-template-columns:1fr}}
  h2{
    font-size:12px;
    font-weight:600;
    color:#999;
    letter-spacing:2px;
    margin-bottom:16px;
    text-transform:uppercase
  }

  /* ---- todo ---- */
  .todo-input{
    width:100%;
    padding:10px 0;
    border:none;
    border-bottom:1px solid #ddd;
    background:transparent;
    font-size:15px;
    color:#333;
    outline:none;
    font-family:inherit
  }
  .todo-input::placeholder{color:#ccc}
  .todo-list{list-style:none;margin-top:12px}
  .todo-list li{
    display:flex;
    align-items:center;
    gap:10px;
    padding:8px 0;
    border-bottom:1px solid #eee;
    font-size:14px;
    color:#555;
    cursor:pointer
  }
  .todo-list li .ck{
    width:16px;height:16px;
    border:1.5px solid #ccc;
    border-radius:50%;
    flex-shrink:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:10px;
    color:#fff;
    transition:.2s
  }
  .todo-list li.done .ck{
    background:#8f8;
    border-color:#8f8
  }
  .todo-list li.done .ck::after{content:"✓"}
  .todo-list li.done .txt{text-decoration:line-through;color:#bbb}
  .todo-list li .del{
    margin-left:auto;
    color:#ddd;
    font-size:13px;
    cursor:pointer
  }
  .todo-list li .del:hover{color:#f88}

  /* ---- progress ---- */
  .phase{
    margin-bottom:20px
  }
  .phase-title{
    font-size:13px;
    font-weight:600;
    color:#333;
    margin-bottom:6px
  }
  .phase-title .pct{
    font-weight:400;
    color:#aaa;
    font-size:12px;
    margin-left:4px
  }
  .phase-title .tag{
    display:inline-block;
    font-size:10px;
    color:#fff;
    background:#8f8;
    border-radius:3px;
    padding:1px 6px;
    margin-left:6px;
    vertical-align:middle
  }
  .phase-title .tag.wip{background:#fc3}
  .bar{
    height:4px;
    background:#eee;
    border-radius:2px;
    overflow:hidden
  }
  .bar-fill{
    height:100%;
    background:#333;
    border-radius:2px;
    transition:width .3s
  }
  .subtask{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    color:#999;
    margin-top:4px;
    padding-left:0
  }
  .subtask span.done{color:#8f8}
</style>
</head>
<body>
<div class="wrap">
  <h1>杂坛</h1>
  <div class="col">
    <!-- todo -->
    <div>
      <h2>今天</h2>
      <input class="todo-input" id="todoInput" placeholder="写点什么..." autofocus>
      <ul class="todo-list" id="todoList"></ul>
    </div>
    <!-- progress -->
    <div>
      <h2>大创</h2>
      <div id="progress">
        <div class="phase">
          <div class="phase-title">申报审批 <span class="pct">100%</span><span class="tag">✓</span></div>
          <div class="bar"><div class="bar-fill" style="width:100%"></div></div>
        </div>
        <div class="phase">
          <div class="phase-title">NSGA-II 复现 <span class="pct">85%</span><span class="tag wip">进行中</span></div>
          <div class="bar"><div class="bar-fill" style="width:85%"></div></div>
          <div class="subtask"><span class="done">✓ 算法原理</span><span class="done">✓ pymoo</span><span class="done">✓ baseline</span><span>○ 结果验证</span></div>
        </div>
        <div class="phase">
          <div class="phase-title">建筑群耦合建模 <span class="pct">0%</span></div>
          <div class="bar"><div class="bar-fill" style="width:0%"></div></div>
        </div>
        <div class="phase">
          <div class="phase-title">LLM 数据融合 <span class="pct">30%</span></div>
          <div class="bar"><div class="bar-fill" style="width:30%"></div></div>
          <div class="subtask"><span class="done">✓ LLM 接口</span><span>○ 数据采集</span><span>○ 数据对齐</span><span>○ 特征工程</span></div>
        </div>
        <div class="phase">
          <div class="phase-title">负荷预测与需求响应 <span class="pct">0%</span></div>
          <div class="bar"><div class="bar-fill" style="width:0%"></div></div>
        </div>
        <div class="phase">
          <div class="phase-title">多目标优化调度 <span class="pct">0%</span></div>
          <div class="bar"><div class="bar-fill" style="width:0%"></div></div>
        </div>
        <div class="phase">
          <div class="phase-title">结题验收 <span class="pct">0%</span></div>
          <div class="bar"><div class="bar-fill" style="width:0%"></div></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
// ---- todo ----
const input = document.getElementById('todoInput')
const list = document.getElementById('todoList')
const KEY = 'zatan_todos'

function load(){
  const data = JSON.parse(localStorage.getItem(KEY) || '[]')
  list.innerHTML = ''
  data.forEach((t,i) => {
    const li = document.createElement('li')
    li.className = t.done ? 'done' : ''
    li.innerHTML = `
      <span class="ck"></span>
      <span class="txt">${t.text}</span>
      <span class="del">×</span>
    `
    li.querySelector('.ck').onclick = () => {
      t.done = !t.done
      save(data)
    }
    li.querySelector('.del').onclick = (e) => {
      e.stopPropagation()
      data.splice(i,1)
      save(data)
    }
    list.appendChild(li)
  })
}

function save(data){
  localStorage.setItem(KEY, JSON.stringify(data))
  load()
}

input.addEventListener('keydown', e => {
  if(e.key === 'Enter' && input.value.trim()){
    const data = JSON.parse(localStorage.getItem(KEY) || '[]')
    data.unshift({text: input.value.trim(), done: false})
    save(data)
    input.value = ''
  }
})

load()
</script>
</body>
</html>
